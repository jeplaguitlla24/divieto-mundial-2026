<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>DIVIETO · Calendario</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;1,700&family=Bebas+Neue&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/base.css">
  <style>
    html, body { height: 100%; overflow: hidden; }
    body { display: flex; justify-content: center; }

    .app {
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: 430px;
      height: 100dvh;
      background: var(--night);
      box-shadow: 0 0 80px rgba(0,0,0,0.8);
      position: relative;
      z-index: 1;
    }

    /* ── Header ── */
    .topbar {
      flex-shrink: 0;
      height: 50px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 16px;
      background: rgba(4,13,31,0.98);
      border-bottom: 1px solid rgba(200,168,75,0.12);
      z-index: 50;
    }

    .back-btn {
      font-size: 1.1rem;
      color: var(--gold);
      cursor: pointer;
      padding: 4px;
      flex-shrink: 0;
    }

    .topbar-title {
      font-family:'Barlow Condensed',sans-serif;font-style:italic;font-weight:700;
      font-size: 1.3rem;
      letter-spacing: 3px;
      color: var(--white);
      flex: 1;
    }

    .topbar-sub {
      font-family: 'Barlow Condensed',sans-serif;
      font-size: 0.55rem;
      letter-spacing: 1.5px;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* ── Tab bar ── */
    .tab-bar {
      flex-shrink: 0;
      display: flex;
      border-bottom: 1px solid rgba(200,168,75,0.1);
      background: rgba(4,13,31,0.6);
    }

    .tab-btn {
      flex: 1;
      padding: 10px 0;
      font-family: 'Barlow Condensed',sans-serif;
      font-size: 0.65rem;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      text-align: center;
      color: var(--muted);
      cursor: pointer;
      border: none;
      background: transparent;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
    }

    .tab-btn.active {
      color: var(--gold2);
      border-bottom-color: var(--gold2);
    }

    /* ── Scroll ── */
    .cal-scroll {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      padding: 12px 10px calc(56px + env(safe-area-inset-bottom));
    }
    .cal-scroll::-webkit-scrollbar { display: none; }

    /* ─── GRUPOS ─── */
    .grupos-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .grupo-card {
      background: var(--deep);
      border: 1px solid rgba(200,168,75,0.1);
      border-radius: 6px;
      overflow: hidden;
    }

    .grupo-header {
      background: rgba(200,168,75,0.07);
      padding: 5px 10px;
      display: flex;
      align-items: baseline;
      gap: 5px;
      border-bottom: 1px solid rgba(200,168,75,0.08);
    }

    .grupo-letra {
      font-family:'Barlow Condensed',sans-serif;font-style:italic;font-weight:700;
      font-size: 1.1rem;
      letter-spacing: 2px;
      color: var(--gold2);
    }

    .grupo-cols {
      display: grid;
      grid-template-columns: 1fr 16px 16px 16px 20px;
      gap: 2px;
      padding: 2px 8px 4px;
      font-family: 'Barlow Condensed',sans-serif;
      font-size: 0.45rem;
      letter-spacing: 0.5px;
      color: var(--muted);
      text-transform: uppercase;
      text-align: center;
    }

    .grupo-cols .col-name { text-align: left; }

    .grupo-fila {
      display: grid;
      grid-template-columns: 1fr 16px 16px 16px 20px;
      gap: 2px;
      padding: 3px 8px;
      font-family: 'Barlow Condensed',sans-serif;
      font-size: 0.58rem;
      align-items: center;
      border-top: 1px solid rgba(255,255,255,0.03);
    }

    .grupo-fila:first-of-type { border-top: none; }

    .fila-pais {
      display: flex;
      align-items: center;
      gap: 4px;
      overflow: hidden;
    }

    .fila-flag { flex-shrink: 0; font-size: 0.75rem; }

    .fila-nombre {
      color: var(--white);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 0.55rem;
    }

    .fila-stat {
      text-align: center;
      color: var(--muted);
      font-size: 0.55rem;
    }

    .fila-pts {
      text-align: center;
      color: var(--gold2);
      font-weight: 500;
      font-size: 0.6rem;
    }

    .fila-clasificado .fila-nombre { color: var(--green); }
    .fila-eliminado .fila-nombre   { color: rgba(240,237,230,0.3); }

    /* ─── PARTIDOS ─── */
    .dia-header {
      font-family:'Barlow Condensed',sans-serif;font-style:italic;font-weight:700;
      font-size: 1rem;
      letter-spacing: 2px;
      color: var(--gold);
      margin: 12px 0 5px;
    }

    .dia-header:first-child { margin-top: 0; }

    .partido-row {
      display: grid;
      grid-template-columns: 24px 1fr auto 1fr auto;
      align-items: center;
      gap: 4px;
      background: var(--deep);
      border: 1px solid rgba(200,168,75,0.06);
      border-radius: 5px;
      padding: 7px 8px;
      margin-bottom: 4px;
    }

    .partido-grp {
      font-family: 'Barlow Condensed',sans-serif;
      font-size: 0.5rem;
      color: var(--gold);
      opacity: 0.6;
      text-align: center;
    }

    .partido-equipo {
      font-family: 'Barlow Condensed',sans-serif;
      font-size: 0.6rem;
      color: var(--white);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .partido-equipo.local { text-align: right; }
    .partido-equipo.visita { text-align: left; }

    .partido-marcador {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
      flex-shrink: 0;
      min-width: 36px;
    }

    .marcador-score {
      font-family:'Barlow Condensed',sans-serif;font-style:italic;font-weight:700;
      font-size: 0.95rem;
      letter-spacing: 2px;
      color: var(--white);
      line-height: 1;
    }

    .marcador-vs {
      font-family: 'Barlow Condensed',sans-serif;
      font-size: 0.45rem;
      color: var(--muted);
      letter-spacing: 1px;
    }

    .marcador-ciudad {
      font-family: 'Barlow Condensed',sans-serif;
      font-size: 0.45rem;
      color: var(--muted);
      letter-spacing: 0.5px;
      white-space: nowrap;
    }

    .partido-ciudad {
      font-family: 'Barlow Condensed',sans-serif;
      font-size: 0.45rem;
      color: var(--muted);
      white-space: nowrap;
      letter-spacing: 0.5px;
    }

    /* ─── XI PANEL ─── */
    .partido-wrap { margin-bottom: 4px; }
    .partido-wrap .partido-row { margin-bottom: 0; cursor: pointer; }
    .partido-wrap .partido-row:hover { border-color: rgba(200,168,75,0.18); }

    .xi-panel {
      display: none;
      background: rgba(4,13,31,0.95);
      border: 1px solid rgba(200,168,75,0.1);
      border-top: none;
      border-radius: 0 0 5px 5px;
      overflow: hidden;
    }
    .xi-panel.open { display: block; }

    .xi-cols { display: grid; grid-template-columns: 1fr 1fr; }

    .xi-team {
      padding: 6px 0;
    }
    .xi-team:first-child { border-right: 1px solid rgba(200,168,75,0.08); }

    .xi-header {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.5rem;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--gold);
      text-align: center;
      padding: 4px 6px 5px;
      opacity: 0.7;
    }

    .xi-row {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 3px 6px;
      border-bottom: 1px solid rgba(255,255,255,0.03);
    }
    .xi-row:last-child { border-bottom: none; }

    .xi-pos {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.45rem;
      font-weight: 700;
      width: 18px;
      height: 14px;
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .xi-pos.PT { background: #1a6b3a; color: #4ade80; }
    .xi-pos.DF { background: #1a3a6b; color: #60a5fa; }
    .xi-pos.MC { background: #6b5a1a; color: #fbbf24; }
    .xi-pos.DL { background: #6b1a1a; color: #f87171; }
    .xi-pos.-- { background: rgba(255,255,255,0.06); color: var(--muted); }

    .xi-escudo {
      width: 12px;
      height: 12px;
      object-fit: contain;
      flex-shrink: 0;
    }

    .xi-nombre {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.52rem;
      color: var(--white);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
    }

    .xi-liga {
      width: 12px;
      height: 12px;
      object-fit: contain;
      flex-shrink: 0;
    }

    .xi-ovr {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.48rem;
      font-weight: 700;
      color: var(--muted);
      flex-shrink: 0;
      width: 16px;
      text-align: right;
    }

    /* loading */
    .loading {
      font-family: 'Barlow Condensed',sans-serif;
      font-size: 0.6rem;
      color: var(--muted);
      text-align: center;
      padding: 24px 0;
      letter-spacing: 1px;
    }
  
  @media (min-width:768px) {
    .app { max-width:100%; }
  }
*{-webkit-user-select:none;user-select:none;}
</style>
</head>
<body>
<div class="app">

  <header class="topbar">
    <span class="back-btn" onclick="history.back()">←</span>
    <div>
      <div class="topbar-title">CALENDARIO</div>
    </div>
    <span class="topbar-sub">Mundial 2026</span>
  </header>

  <div class="tab-bar">
    <button class="tab-btn active" id="btn-partidos">PARTIDOS</button>
    <button class="tab-btn" id="btn-grupos">GRUPOS</button>
  </div>

  <div class="cal-scroll" id="cal-scroll">
    <div id="view-partidos"><div class="loading">Cargando...</div></div>
    <div id="view-grupos" style="display:none"></div>
  </div>

</div>

<script src="/shared/nav.js"></script>
<script src="/js/jugadores.js"></script>
<script src="/js/club_liga.js"></script>

<script type="module">
  import { PAISES, GRUPOS, PARTIDOS, horaMadrid, fechaMadrid, dtUTC } from '/js/mundial2026.js';
  import { ALINEACIONES } from '/js/alineaciones.js';
  import { db } from '/js/config.js';
  import { collection, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

  const MESES = ['ENE','FEB','MAR','ABR','MAY','JUN','JUL','AGO','SEP','OCT','NOV','DIC'];

  // ── Resultados en tiempo real ────────────────
  let resultados = {}; // { matchId: { l: 2, v: 1 } }

  onSnapshot(collection(db, 'resultados'), snap => {
    resultados = {};
    snap.forEach(doc => { resultados[doc.id] = doc.data(); });
    renderAll();
  });

  // ── Clasificaciones ──────────────────────────
  function getStandings(equipos) {
    const s = {};
    for (const c of equipos) s[c] = { pj:0, g:0, e:0, p:0, gf:0, gc:0, pts:0 };

    for (const partido of PARTIDOS) {
      if (!equipos.includes(partido.local)) continue;
      const r = resultados[String(partido.id)];
      if (!r) continue;
      const { l, v } = r;
      s[partido.local].pj++; s[partido.visit].pj++;
      s[partido.local].gf += l;  s[partido.local].gc += v;
      s[partido.visit].gf += v;  s[partido.visit].gc += l;
      if (l > v)      { s[partido.local].g++; s[partido.local].pts += 3; s[partido.visit].p++; }
      else if (l < v) { s[partido.visit].g++; s[partido.visit].pts += 3; s[partido.local].p++; }
      else            { s[partido.local].e++; s[partido.local].pts++; s[partido.visit].e++; s[partido.visit].pts++; }
    }

    return equipos
      .map(c => ({ code: c, ...s[c] }))
      .sort((a, b) => b.pts - a.pts || (b.gf - b.gc) - (a.gf - a.gc) || b.gf - a.gf);
  }

  // ── Render GRUPOS ────────────────────────────
  function renderGrupos() {
    const container = document.getElementById('view-grupos');
    const grid = document.createElement('div');
    grid.className = 'grupos-grid';

    for (const [letra, equipos] of Object.entries(GRUPOS)) {
      const card = document.createElement('div');
      card.className = 'grupo-card';

      const standings = getStandings(equipos);
      const jugados = standings.some(s => s.pj > 0);

      card.innerHTML = `
        <div class="grupo-header">
          <span class="grupo-letra">GRP ${letra}</span>
        </div>
        <div class="grupo-cols">
          <span class="col-name"></span>
          <span>PJ</span><span>G</span><span>P</span><span>Pts</span>
        </div>
        ${standings.map((s, i) => {
          const p = PAISES[s.code];
          const cls = jugados && i < 2 ? 'fila-clasificado' : '';
          return `<div class="grupo-fila ${cls}">
            <div class="fila-pais">
              <span class="fila-flag">${p.f}</span>
              <span class="fila-nombre">${p.n}</span>
            </div>
            <span class="fila-stat">${s.pj}</span>
            <span class="fila-stat">${s.g}</span>
            <span class="fila-stat">${s.p}</span>
            <span class="fila-pts">${s.pts}</span>
          </div>`;
        }).join('')}
      `;
      grid.appendChild(card);
    }

    container.innerHTML = '';
    container.appendChild(grid);
  }

  // ── XI helpers ───────────────────────────────
  let _jugDB = null;
  function getJugDB() {
    if (_jugDB) return _jugDB;
    if (typeof JUGADORES_MUNDIAL === 'undefined') return null;
    _jugDB = {};
    for (const sel of JUGADORES_MUNDIAL)
      for (const j of sel.jugadores)
        _jugDB[j.nombre] = { ...j, seleccion: sel.seleccion };
    return _jugDB;
  }

  function escudoSelUrl(seleccion) {
    if (typeof JUGADORES_MUNDIAL === 'undefined') return '';
    const map = {
      'MEXICO': 'mexico-national-team-footballlogos-org.webp',
      'SUDAFRICA': 'south-africa-national-team-footballlogos-org.webp',
      'COREA DEL SUR': 'south-korea-national-team-footballlogos-org.webp',
      'REPUBLICA CHECA': 'czech-republic-national-team-footballlogos-org.webp',
    };
    return map[seleccion] ? `/assets/img/escudos/selecciones/${map[seleccion]}` : '';
  }

  function ligaUrl(club) {
    if (typeof CLUB_LIGA === 'undefined' || !club) return '';
    const liga = CLUB_LIGA[club];
    return liga ? `/assets/img/escudos/ligas/${liga}` : '';
  }

  function buildXiHtml(code) {
    const ali = ALINEACIONES[code];
    if (!ali) return '';
    const db = getJugDB();
    let html = `<div class="xi-header">POSIBLE XI · ${ali.f}</div>`;
    for (const nombre of ali.xi) {
      const j = db ? db[nombre] : null;
      const pos   = j ? j.posDraft : '--';
      const ovr   = j ? j.overall  : '';
      const club  = j ? (j.club || '') : '';
      const esSel = j ? escudoSelUrl(j.seleccion) : '';
      const esLig = ligaUrl(club);
      html += `<div class="xi-row">
        <span class="xi-pos ${pos}">${pos}</span>
        ${esSel ? `<img class="xi-escudo" src="${esSel}" onerror="this.style.display='none'">` : ''}
        <span class="xi-nombre">${nombre.split(' ').slice(-1)[0]}</span>
        ${esLig ? `<img class="xi-liga" src="${esLig}" onerror="this.style.display='none'">` : ''}
        ${ovr ? `<span class="xi-ovr">${ovr}</span>` : ''}
      </div>`;
    }
    return html;
  }

  // ── Render PARTIDOS ──────────────────────────
  function renderPartidos() {
    const container = document.getElementById('view-partidos');

    const sorted = [...PARTIDOS].sort((a, b) => dtUTC(a.fecha, a.hora) - dtUTC(b.fecha, b.hora));
    const porFecha = {};
    for (const p of sorted) {
      const key = fechaMadrid(p.fecha, p.hora);
      if (!porFecha[key]) porFecha[key] = [];
      porFecha[key].push(p);
    }

    let html = '';
    for (const [key, partidos] of Object.entries(porFecha)) {
      const d = new Date(key + 'T12:00:00');
      html += `<div class="dia-header">${d.getDate()} ${MESES[d.getMonth()]} · ${d.getFullYear()}</div>`;

      for (const p of partidos) {
        const loc = PAISES[p.local], vis = PAISES[p.visit];
        const r = resultados[String(p.id)];
        const hora = horaMadrid(p.fecha, p.hora);
        const centro = r
          ? `<div class="partido-marcador"><span class="marcador-score">${r.l} – ${r.v}</span></div>`
          : `<div class="partido-marcador"><span class="marcador-vs">${hora}</span><span class="marcador-ciudad">${p.ciudad}</span></div>`;

        const tieneXi = ALINEACIONES[p.local] || ALINEACIONES[p.visit];
        const xiLocal = ALINEACIONES[p.local] ? buildXiHtml(p.local) : '';
        const xiVisit = ALINEACIONES[p.visit] ? buildXiHtml(p.visit) : '';

        const xiPanel = tieneXi ? `
          <div class="xi-panel" id="xi-${p.id}">
            <div class="xi-cols">
              <div class="xi-team">${xiLocal}</div>
              <div class="xi-team">${xiVisit}</div>
            </div>
          </div>` : '';

        html += `<div class="partido-wrap">
          <div class="partido-row${tieneXi ? ' has-xi' : ''}" ${tieneXi ? `onclick="toggleXi('xi-${p.id}')"` : ''}>
            <span class="partido-grp">${p.grp}</span>
            <span class="partido-equipo local">${loc.n} ${loc.f}</span>
            ${centro}
            <span class="partido-equipo visita">${vis.f} ${vis.n}</span>
          </div>
          ${xiPanel}
        </div>`;
      }
    }
    container.innerHTML = html;
  }

  window.toggleXi = function(id) {
    document.getElementById(id)?.classList.toggle('open');
  };

  function renderAll() {
    renderGrupos();
    renderPartidos();
  }

  // ── Tabs ─────────────────────────────────────
  document.getElementById('btn-partidos').addEventListener('click', () => {
    document.getElementById('view-partidos').style.display = '';
    document.getElementById('view-grupos').style.display = 'none';
    document.getElementById('btn-partidos').classList.add('active');
    document.getElementById('btn-grupos').classList.remove('active');
    document.getElementById('cal-scroll').scrollTop = 0;
  });

  document.getElementById('btn-grupos').addEventListener('click', () => {
    document.getElementById('view-grupos').style.display = '';
    document.getElementById('view-partidos').style.display = 'none';
    document.getElementById('btn-grupos').classList.add('active');
    document.getElementById('btn-partidos').classList.remove('active');
    document.getElementById('cal-scroll').scrollTop = 0;
  });
</script>
</body>
</html>
